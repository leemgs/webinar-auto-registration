<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웨비나 일정 · Webinar Hub</title>
  <meta name="description" content="국내 IT 웨비나 월별 일정 및 경품 정보 모음 (올쇼TV, 쉐어드IT, DD튜브, e4ds, 토크아이티, 두비즈, CLOIT:ON)" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <h1>📡 웨비나 허브</h1>
        <p class="tagline">국내 IT 웨비나 월별 일정 · 경품 정보</p>
      </div>
      <div class="header-meta">
        <a class="ics-link" href="webinars.ics" title="구글 캘린더에서 URL로 구독">📅 캘린더 구독(ICS)</a>
        <span id="updated" class="updated"></span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="controls">
      <div class="view-toggle" role="tablist">
        <button id="view-calendar" class="active" data-view="calendar">달력</button>
        <button id="view-list" data-view="list">목록</button>
      </div>

      <div class="filters">
        <div id="source-filters" class="chip-group" aria-label="출처 필터"></div>
        <div id="prize-filters" class="chip-group" aria-label="경품 필터"></div>
      </div>
    </section>

    <section id="calendar-view" class="view">
      <div class="cal-nav">
        <button id="prev-month" aria-label="이전 달">‹</button>
        <h2 id="cal-title"></h2>
        <button id="next-month" aria-label="다음 달">›</button>
        <button id="today-btn" class="today-btn">오늘</button>
      </div>
      <div class="cal-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div id="calendar-grid" class="cal-grid"></div>
    </section>

    <section id="list-view" class="view hidden"></section>

    <p id="empty-state" class="empty hidden">표시할 웨비나가 없습니다.</p>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <button class="modal-close" data-close aria-label="닫기">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="wrap">
      <p>매일 자동 수집 · <a href="https://github.com/leemgs/webinar" id="repo-link">webinar</a></p>
      <p class="disclaimer">일정·경품 정보는 각 사이트 기준이며 변경될 수 있습니다. 정확한 내용은 원문 링크에서 확인하세요.</p>
    </div>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
