# ---------------------------------------------------------------------------
# Per-site configuration for scraping + auto-registration.
#
# Selectors are centralized here so they can be tuned without touching Python.
# `register.enabled` is false by default; flip to true once the login flow has
# been verified against a live account (credentials come from env, see .env.example).
#
# Fields:
#   name            display name (Korean)
#   base_url        site root
#   listing_url     page listing upcoming webinars
#   requires_js     true  -> must render with a real browser before parsing
#   requires_login  true  -> listing/detail not visible without a session
#   scraper         python module key in src/webinar/scrapers/
#   wait_selector   (optional) CSS selector to await before scraping (SPA hydration)
#   login:          login form flow (used by registrar)
#   register:       registration button flow (used by registrar)
# ---------------------------------------------------------------------------

allshowtv:
  name: "올쇼TV"
  base_url: "https://www.allshowtv.com"
  listing_url: "https://www.allshowtv.com"
  requires_js: true
  requires_login: false
  scraper: allshowtv
  wait_selector: "body"
  login:
    url: "https://www.allshowtv.com/member/login"
    user_selector: "input[name='email'], input[name='id'], #id"
    pass_selector: "input[name='password'], input[type='password'], #password"
    submit_selector: "button[type='submit'], .btn_login"
  register:
    enabled: false
    button_selector: ".btn_apply, a:has-text('신청'), button:has-text('신청')"
    confirm_selector: "button:has-text('확인'), button:has-text('신청완료')"

